<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>GI Creative</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 60px 20px;
      background: linear-gradient(135deg, #0f172a, #1e293b);
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 30px;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      opacity: 0.85;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 15px 30px;
      background-color: #22c55e;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #16a34a;
      transform: scale(1.05);
    }

    section {
      padding: 60px 20px;
    }

    .servicos {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .card {
      background-color: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 250px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0px 15px 30px rgba(0,0,0,0.5);
    }

    .galeria {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .galeria img {
      width: 280px;
      border-radius: 12px;
      transition: 0.3s;
      cursor: pointer;
    }

    .galeria img:hover {
      transform: scale(1.05);
      box-shadow: 0px 10px 25px rgba(0,0,0,0.5);
    }

    footer {
      padding: 30px;
      font-size: 14px;
      opacity: 0.6;
      background-color: #1e293b;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 32px;
      }

      .card, .galeria img {
        width: 90%;
      }
    }

  </style>
</head>
<body>

<header>
  <h1>GI Creative</h1>
  <p>Criação de Artes Profissionais para Impressão e Redes Sociais</p>
  <a class="btn" href="https://wa.me/5513996068418" target="_blank">
    Fale no WhatsApp
  </a>
</header>

<section>
  <h2>Serviços</h2>
  <div class="servicos">
    <div class="card">Artes para Impressão</div>
    <div class="card">Criativos para Redes Sociais</div>
    <div class="card">Banners e Fachadas</div>
  </div>
</section>

<section>
  <h2>Portfólio</h2>
  <div class="galeria">
    <img src="arte1.jpg">
    <img src="arte2.jpg">
    <img src="arte3.jpg">
  </div>
</section>

<footer>
  © 2026 GI Creative - Todos os direitos reservados.
</footer>

</body>
</html>
